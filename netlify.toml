[build]
  publish = "web"

[[redirects]]
  from = "/api/*"
  to = "https://measurements-ban-lesser-sent.trycloudflare.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/PDF/*"
  to = "https://measurements-ban-lesser-sent.trycloudflare.com/PDF/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
