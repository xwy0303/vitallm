# Local hash_v1 rollback runtime config. This file intentionally contains no secrets.
# Keep this baseline available for regression comparison and emergency rollback.

document_parser:
  provider: mineru_local
  network_scope: self_hosted
  submit_base_url: http://127.0.0.1:8000
  result_base_url: http://127.0.0.1:8000
  timeout_seconds: 120

vector_store:
  provider: qdrant
  url: http://127.0.0.1:6333
  collection: enzyme_immobilization_literature
  timeout_seconds: 30

embedding:
  provider: hash_v1
  dimensions: 768
  model_name: BAAI/bge-base-en-v1.5
  device: mps
  local_files_only: true

retrieval:
  top_k: 8
  usable_only: true
  formulation_candidate_multiplier: 16
  formulation_candidate_min: 80

generator:
  provider: siliconflow
  temperature: 0.1
  timeout_seconds: 180
  max_retries: 2

generator_providers:
  mock:
    enabled: true
    model: mock-generator-v1
  siliconflow:
    enabled: true
    base_url: https://api.siliconflow.cn/v1
    api_key_env: SILICONFLOW_API_KEY
    model: deepseek-ai/DeepSeek-V4-Flash
  siliconflow_review:
    enabled: true
    base_url: https://api.siliconflow.cn/v1
    api_key_env: SILICONFLOW_API_KEY
    model: Qwen/Qwen3.6-35B-A3B
  deepseek:
    enabled: false
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    model: TBD
