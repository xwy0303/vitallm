    <text x="54" y="70" class="tiny">直接进入候选知识库</text>
  </g>

  <path d="M1328 612 C1358 706 1410 724 1468 720" class="dashArrow"/>
  <g transform="translate(1330 690)" filter="url(#shadow)">
