    <rect x="0" y="0" width="360" height="52" rx="8" fill="#0d63d5"/>
    <text x="84" y="35" class="cardTitle">Review Queue</text>
    <text x="28" y="84" class="tiny">OCR 重复、百分比异常、表格错位</text>
    <text x="28" y="112" class="tiny">学生核对原文后确认 / 修正 / 剔除</text>
  </g>
  <path d="M1690 751 C1768 714 1788 652 1790 596" class="dashArrow"/>

  <line x1="52" y1="842" x2="1870" y2="842" class="dash"/>
  <path d="M390 932 H768" class="softLine"/>
  <path d="M1122 932 H1500" class="softLine"/>

  <g filter="url(#shadow)">
    <rect x="64" y="872" width="420" height="126" rx="8" fill="#ffffff"/>
    <rect x="64" y="872" width="420" height="54" rx="8" fill="#0b49b8"/>
    <text x="172" y="908" class="label">学生工作量</text>
    <text x="96" y="958" class="tiny">PDF 收集</text>
    <text x="224" y="958" class="tiny">证据校验</text>
    <text x="352" y="958" class="tiny">异常标注</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="750" y="872" width="420" height="126" rx="8" fill="#ffffff"/>
    <rect x="750" y="872" width="420" height="54" rx="8" fill="#0f74c9"/>
    <text x="900" y="908" class="label">质量控制</text>
    <text x="796" y="958" class="tiny">页码追溯</text>
    <text x="928" y="958" class="tiny">数值范围</text>
    <text x="1060" y="958" class="tiny">人工抽检</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1436" y="872" width="420" height="126" rx="8" fill="#ffffff"/>
    <rect x="1436" y="872" width="420" height="54" rx="8" fill="#3766df"/>
    <text x="1568" y="908" class="label">项目产出</text>
    <text x="1478" y="958" class="tiny">知识库</text>
    <text x="1586" y="958" class="tiny">推荐 Demo</text>
    <text x="1728" y="958" class="tiny">论文支撑</text>
  </g>

  <g transform="translate(72 704)">
    <rect x="0" y="0" width="1040" height="88" rx="8" fill="#f1f7ff" stroke="#c9daf4"/>
    <text x="28" y="36" class="small">B10 smoke test 已验证：36 个 RAG chunks、81 条 evidence records、24 条 review queue</text>
    <text x="28" y="68" class="tiny">抽取内容覆盖 BCL、hierarchical mesoporous ZIF-8、adsorption、pH 7.5、25 degC、700 mg loading、biodiesel yield 93.4%、8 cycles。</text>
