  <text x="1490" y="234" class="label">推荐应用与汇报输出</text>
  <line x1="52" y1="305" x2="1870" y2="305" class="dash"/>

  <text x="48" y="388" class="zone">云下</text>

  <g transform="translate(70 480)" filter="url(#shadow)">
    <path d="M0 0 H200 L238 86 H0 Z" fill="url(#softBlue)"/>
