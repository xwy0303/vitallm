    <text x="36" y="92" class="cardText" fill="#ffffff">enzyme / carrier</text>
    <text x="36" y="124" class="cardText" fill="#ffffff">condition / metric</text>
  </g>

  <path d="M1126 522 H1210" class="line"/>
  <g transform="translate(1218 432)" filter="url(#shadow)">
    <polygon points="110,0 220,90 110,180 0,90" fill="#ffffff" stroke="#2c66c8" stroke-width="3"/>
    <text x="60" y="80" class="small">质量门</text>
    <text x="39" y="116" class="tiny">异常进入复核</text>
  </g>

  <path d="M1438 522 H1510" class="line"/>
  <g transform="translate(1518 455)" filter="url(#shadow)">
    <path d="M0 0 H260 L298 140 H0 Z" fill="url(#softBlue)"/>
    <text x="52" y="52" class="label">可信知识库</text>
    <text x="34" y="92" class="cardText" fill="#ffffff">curated facts</text>
    <text x="34" y="124" class="cardText" fill="#ffffff">vector DB + schema</text>
  </g>

  <path d="M1328 432 C1358 352 1410 344 1468 360" class="dashArrow"/>
  <g transform="translate(1468 326)" filter="url(#shadow)">
    <rect x="0" y="0" width="292" height="90" rx="45" fill="#ffffff" stroke="#c7d8f1" stroke-width="2"/>
