  <text x="76" y="636" class="tiny">脂肪酶固定化、MOF、载体、应用场景</text>

  <path d="M322 522 H430" class="line"/>
  <g transform="translate(442 455)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="140" rx="8" fill="#ffffff"/>
    <rect x="0" y="0" width="250" height="58" rx="8" fill="#0d63d5"/>
    <text x="72" y="38" class="cardTitle">MinerU</text>
    <text x="30" y="92" class="cardText">PDF 解析</text>
    <text x="30" y="124" class="tiny">版面 / OCR / 表格 / 图片</text>
  </g>

  <path d="M704 522 H812" class="line"/>
  <g transform="translate(824 455)" filter="url(#shadow)">
    <path d="M0 0 H250 L288 140 H0 Z" fill="url(#softBlue)"/>
