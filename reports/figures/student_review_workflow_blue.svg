    <text x="92" y="78" style="font-family:Arial,'PingFang SC';font-size:23px;font-weight:700;fill:#134b9f">Review Cloud</text>
  </g>

  <text x="48" y="246" class="zone">云上</text>
  <g filter="url(#shadow)">
    <rect x="116" y="194" width="330" height="62" rx="8" fill="url(#blueGrad)"/>
    <rect x="486" y="194" width="360" height="62" rx="8" fill="url(#blueGrad)"/>
    <rect x="886" y="194" width="440" height="62" rx="8" fill="url(#blueGrad)"/>
    <rect x="1438" y="194" width="350" height="62" rx="8" fill="url(#blueGrad)"/>
