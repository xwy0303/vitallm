    <text x="110" y="947" class="tiny">MinerU</text>
    <text x="224" y="947" class="tiny">Python</text>
    <text x="342" y="947" class="tiny">Schema</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="750" y="858" width="420" height="112" rx="8" fill="#ffffff"/>
    <rect x="750" y="858" width="420" height="54" rx="8" fill="#0f74c9"/>
