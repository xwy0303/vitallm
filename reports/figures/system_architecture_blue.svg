  </g>
  <text x="76" y="622" class="small">采集 → 清洗 → 价值挖掘</text>
  <text x="76" y="660" class="tiny">PDF、表格、图示、实验条件</text>

  <path d="M312 548 H552" class="line"/>
  <text x="316" y="526" class="small">高质量文献集（标准化登记）</text>

  <g transform="translate(596 505)" filter="url(#shadow)">
    <path d="M0 0 H176 L213 84 H0 Z" fill="url(#softBlue)"/>
    <text x="62" y="52" class="label">解析</text>
  </g>
  <text x="620" y="625" class="small">MinerU 本地服务</text>
  <text x="620" y="660" class="tiny">layout / OCR / table / image</text>

  <path d="M804 548 H910" class="line"/>

  <circle cx="940" cy="420" r="62" fill="#ffffff" stroke="#2d65c8" stroke-width="2"/>
  <text x="896" y="431" class="circleText">L0 原文</text>
  <circle cx="940" cy="562" r="62" fill="#ffffff" stroke="#2d65c8" stroke-width="2"/>
  <text x="878" y="573" class="circleText">L1 证据</text>
  <circle cx="940" cy="704" r="62" fill="#ffffff" stroke="#808a96" stroke-width="2"/>
  <text x="878" y="715" class="circleText muted">L2 场景</text>
  <path d="M812 520 C842 450 865 426 878 420" class="dashArrow"/>
  <path d="M812 548 H878" class="dashArrow"/>
  <path d="M812 578 C842 653 865 695 878 704" class="dashArrow" style="stroke:#9da7b2;marker-end:url(#softArrow)"/>

  <g transform="translate(1038 505)" filter="url(#shadow)">
    <path d="M0 0 H216 L253 84 H0 Z" fill="url(#softBlue)"/>
    <text x="55" y="52" class="label">知识库</text>
  </g>
  <text x="1060" y="625" class="small">RAG 原料层 + Evidence records</text>
  <text x="1060" y="660" class="tiny">chunks、table records、review queue</text>

  <path d="M1288 548 H1358" class="line"/>
  <g transform="translate(1328 380)">
    <rect x="0" y="0" width="190" height="56" rx="28" fill="#ffffff" stroke="#c7d8f1" stroke-width="2" filter="url(#shadow)"/>
