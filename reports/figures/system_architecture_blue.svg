  <text x="154" y="234" class="label">论文数据资产平台</text>
  <text x="458" y="234" class="label">可信知识空间（交易场）</text>
  <text x="858" y="234" class="label">固定化知识大模型服务平台</text>
  <text x="1507" y="234" class="label">推荐应用（一云）</text>
  <line x1="52" y1="305" x2="1870" y2="305" class="dash"/>

  <text x="48" y="390" class="zone">云下</text>

  <g transform="translate(78 505)" filter="url(#shadow)">
    <path d="M0 0 H195 L232 84 H0 Z" fill="url(#softBlue)"/>
