  <g filter="url(#shadow)">
    <rect x="1436" y="858" width="420" height="112" rx="8" fill="#ffffff"/>
    <rect x="1436" y="858" width="420" height="54" rx="8" fill="#3766df"/>
    <text x="1586" y="894" class="label">科研应用化</text>
    <text x="1494" y="947" class="tiny">推荐</text>
