<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a63d8"/>
      <stop offset="100%" stop-color="#4168e8"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5fbff" stop-opacity="0.2"/>
      <stop offset="42%" stop-color="#3388ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#18a6d9" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="palePanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#12448c" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M0,0 L13,6.5 L0,13 Z" fill="#2266d1"/>
    </marker>
    <marker id="softArrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto">
      <path d="M0,0 L13,6.5 L0,13 Z" fill="#8bb9ef"/>
    </marker>
    <style>
      .title { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 48px; font-weight: 800; fill: #071c3a; }
      .subtitle { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #7a808a; }
      .label { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 26px; font-weight: 800; fill: #ffffff; }
      .small { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 21px; font-weight: 650; fill: #17345f; }
      .tiny { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 18px; font-weight: 550; fill: #333b47; }
      .muted { fill: #717b89; }
      .zone { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 38px; font-weight: 900; fill: #04152d; }
      .circleText { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 28px; font-weight: 800; fill: #102f65; }
      .dash { stroke: #7fa2ce; stroke-width: 2; stroke-dasharray: 8 8; }
      .line { stroke: #2266d1; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .softLine { stroke: #8bb9ef; stroke-width: 8; fill: none; marker-end: url(#softArrow); opacity: 0.55; }
      .dashArrow { stroke: #2769d5; stroke-width: 4; fill: none; stroke-dasharray: 12 12; marker-end: url(#arrow); }
      .boxText { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 22px; font-weight: 750; fill: #17345f; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="#ffffff"/>
  <rect x="0" y="72" width="16" height="100" fill="url(#blueGrad)"/>
  <text x="58" y="96" class="title">生物酶固定化智能推荐系统</text>
  <text x="58" y="142" class="subtitle">从论文 PDF 到可审计知识库，再到固定化剂推荐与配方优化</text>
  <g transform="translate(1608 54)">
    <path d="M0 30 L36 10 L74 30 L74 75 L36 96 L0 75 Z" fill="#145fc8"/>
    <path d="M18 39 L36 29 L55 39 L36 50 Z" fill="#ffffff" opacity="0.9"/>
    <path d="M18 57 L36 47 L55 57 L36 68 Z" fill="#ffffff" opacity="0.75"/>
    <text x="92" y="48" style="font-family:Arial,'PingFang SC';font-size:32px;font-weight:800;fill:#134b9f">Enzyme AI</text>
    <text x="92" y="78" style="font-family:Arial,'PingFang SC';font-size:23px;font-weight:700;fill:#134b9f">Knowledge Cloud</text>
  </g>

  <text x="48" y="246" class="zone">云上</text>
  <g filter="url(#shadow)">
    <rect x="116" y="194" width="280" height="62" rx="8" fill="url(#blueGrad)"/>
    <rect x="424" y="194" width="330" height="62" rx="8" fill="url(#blueGrad)"/>
    <rect x="784" y="194" width="500" height="62" rx="8" fill="url(#blueGrad)"/>
    <rect x="1450" y="194" width="330" height="62" rx="8" fill="url(#blueGrad)"/>
