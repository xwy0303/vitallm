    <rect x="0" y="314" width="190" height="56" rx="28" fill="#ffffff" stroke="#c7d8f1" stroke-width="2" filter="url(#shadow)"/>
    <text x="42" y="351" class="small">配方优化</text>
    <rect x="0" y="157" width="190" height="56" rx="28" fill="#ffffff" stroke="#c7d8f1" stroke-width="2" filter="url(#shadow)"/>
    <text x="42" y="194" class="small">证据追溯</text>
  </g>
  <path d="M1280 512 C1308 430 1320 410 1328 408" class="dashArrow"/>
  <path d="M1288 548 H1328" class="dashArrow"/>
  <path d="M1280 585 C1308 670 1320 715 1328 722" class="dashArrow"/>

  <path d="M1518 548 H1624 L1666 468 L1666 628 H1624" fill="none" stroke="#2365ce" stroke-width="4"/>
  <text x="1554" y="490" class="tiny">推荐</text>
  <text x="1554" y="548" class="tiny">优化</text>
  <text x="1554" y="606" class="tiny">审计</text>
  <g transform="translate(1692 390)">
    <text x="0" y="0" class="small">最终可呈现效果</text>
    <text x="0" y="46" class="tiny">• 固化剂候选排序</text>
    <text x="0" y="84" class="tiny">• 配方条件优化建议</text>
    <text x="0" y="122" class="tiny">• 论文页码与证据引用</text>
    <text x="0" y="160" class="tiny">• 异常证据人工复核</text>
    <text x="0" y="224" class="small">学生协作价值</text>
    <text x="0" y="270" class="tiny">• PDF 收集</text>
    <text x="0" y="308" class="tiny">• Review queue 校验</text>
    <text x="0" y="346" class="tiny">• 知识库持续扩容</text>
  </g>

  <line x1="52" y1="828" x2="1870" y2="828" class="dash"/>
  <path d="M300 918 H708" class="softLine"/>
  <path d="M1120 918 H1510" class="softLine"/>

  <g filter="url(#shadow)">
    <rect x="64" y="858" width="420" height="112" rx="8" fill="#ffffff"/>
    <rect x="64" y="858" width="420" height="54" rx="8" fill="#0b49b8"/>
